<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: white;
    }

    .wrapper {
      transform: scale(.66);
      transform-origin: top left;
      width: 151%;  /* 100 / 0.5 to compensate for scale */
      height: 151%;
    }

    iframe {
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
    }
  </style>
</head>Get
<body>
  <div class="wrapper">
    <iframe
      src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTMv3qp8lIjDtC0_PwtZi8UAx9W8JNQNIXnVmMpA2NgTHN5WaN49DZsPH_qcV6Imq89-O9Ba7gPh9eH/pubchart?oid=937437071&format=interactive"
      frameborder="0"
      allowfullscreen
    ></iframe>
  </div>
</body>
</html>
